<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASSİKTİR.DE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, centralMesh;
        const orbitalTexts = [];
        const orbitalCount = 30;

        // Fontu dışarıdan yüklemek yerine, Three.js'in içindeki hazır yapıya güveniyoruz
        // Not: Font yükleme asenkron olduğu için her şeyi bir loader içine alıyoruz
        const loader = new THREE.FontLoader();
        
        // Bu URL genellikle CORS sorunu çıkarmaz, en stabil font kaynağıdır
        loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', function (font) {
            init(font);
            animate();
        }, undefined, function(err) {
            console.error("Font yüklenemedi, alternatif yönteme geçiliyor...", err);
        });

        function init(font) {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1.2);
            pointLight.position.set(10, 10, 20);
            scene.add(pointLight);

            // 1. MERKEZDEKİ BÜYÜK KIRMIZI YAZI
            const centerGeo = new THREE.TextGeometry('hassiktir', {
                font: font,
                size: 3.5,
                height: 0.8,
                curveSegments: 12,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.1
            });
            centerGeo.center();
            const centerMat = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 100 });
            centralMesh = new THREE.Mesh(centerGeo, centerMat);
            scene.add(centralMesh);

            // 2. ETRAFTAKİ PASTEL KAOS
            for (let i = 0; i < orbitalCount; i++) {
                const size = Math.random() * 0.7 + 0.3;
                const orbGeo = new THREE.TextGeometry('hassiktir', {
                    font: font,
                    size: size,
                    height: 0.1,
                    curveSegments: 4
                });
                orbGeo.center();
                
                const color = new THREE.Color().setHSL(Math.random(), 0.7, 0.7);
                const orbMat = new THREE.MeshPhongMaterial({ color: color });
                const mesh = new THREE.Mesh(orbGeo, orbMat);

                mesh.userData = {
                    radius: Math.random() * 15 + 8,
                    angle: Math.random() * Math.PI * 2,
                    speed: (Math.random() - 0.5) * 0.02,
                    rotSpeed: new THREE.Vector3(Math.random()*0.05, Math.random()*0.05, 0)
                };
                
                scene.add(mesh);
                orbitalTexts.push(mesh);
            }

            window.addEventListener('resize', onWindowResize, false);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (centralMesh) centralMesh.rotation.y += 0.01;

            orbitalTexts.forEach(mesh => {
                mesh.userData.angle += mesh.userData.speed;
                mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.y = Math.sin(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.z = Math.sin(mesh.userData.angle * 0.5) * 5;
                
                mesh.rotation.x += mesh.userData.rotSpeed.x;
                mesh.rotation.y += mesh.userData.rotSpeed.y;
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
